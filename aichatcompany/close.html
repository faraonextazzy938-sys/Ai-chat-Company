<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Chat Company — Service Closed</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f5f0eb;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .card {
    background: #fff;
    border-radius: 16px;
    padding: 56px 48px;
    max-width: 520px;
    width: 100%;
    text-align: center;
    box-shadow: 0 2px 24px rgba(0,0,0,0.07);
  }
  .icon {
    width: 56px;
    height: 56px;
    background: #f0ebe3;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 28px;
  }
  .icon svg { width: 28px; height: 28px; color: #8c7355; }
  h1 {
    font-size: 22px;
    font-weight: 700;
    color: #1a1a1a;
    margin-bottom: 14px;
    line-height: 1.3;
  }
  p {
    font-size: 15px;
    color: #666;
    line-height: 1.7;
    margin-bottom: 32px;
  }
  a.link {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    color: #8c7355;
    font-size: 14px;
    font-weight: 600;
    text-decoration: none;
    border: 1.5px solid #d4c4b0;
    border-radius: 8px;
    padding: 10px 20px;
    transition: all 0.2s;
  }
  a.link:hover { background: #f5f0eb; border-color: #8c7355; }
  .divider {
    width: 40px;
    height: 2px;
    background: #e8e0d5;
    margin: 0 auto 28px;
    border-radius: 2px;
  }
  .brand {
    margin-top: 40px;
    font-size: 12px;
    color: #bbb;
    letter-spacing: 0.5px;
  }
</style>
</head>
<body>
<div class="card">
  <div class="icon">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="10"/>
      <line x1="12" y1="8" x2="12" y2="12"/>
      <line x1="12" y1="16" x2="12.01" y2="16"/>
    </svg>
  </div>
  <h1>This service no longer supports connections</h1>
  <div class="divider"></div>
  <p>AI Chat Company has been shut down due to technical issues. We appreciate everyone who used our service.</p>
  <a class="link" href="https://docs-nomchat.up.railway.app" target="_blank">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
    Learn more — Nomchat Docs
  </a>
  <div class="brand">AI Chat Company</div>
</div>
</body>
</html>
