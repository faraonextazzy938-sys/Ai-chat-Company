<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/svg+xml" href="/icon.svg"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In — AI Chat Company</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="grid-bg"></div>
<div class="noise-overlay"></div>
<div class="glow-orb glow-orb-1"></div>
<div class="glow-orb glow-orb-2"></div>

<header class="header" id="header">
  <div class="header-inner">
    <a href="/" class="logo">
      <div class="logo-mark">
        <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
        </svg>
      </div>
      <span class="logo-text">AI Chat Co.</span>
    </a>
    <nav class="nav">
      <a href="/" class="nav-link">Home</a>
      <a href="/features.html" class="nav-link">Features</a>
    </nav>
  </div>
</header>

<main class="login-page">
  <div class="login-card" style="max-width:400px; text-align:center;">

    <div class="login-logo">
      <div class="login-logo-mark">
        <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" width="22" height="22">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
        </svg>
      </div>
      <span class="login-logo-text">AI Chat Co.</span>
    </div>

    <div id="login-alert" style="display:none; margin-bottom:16px;"></div>

    <div class="login-title">Welcome</div>
    <p class="login-subtitle" style="margin-bottom:32px;">Sign in with your Nomchat ID to access AI Chat Company. Your chats, credits and settings are saved to your account.</p>

    <button class="nomchat-login-btn" onclick="nomchatLogin()" style="width:100%; padding:16px; font-size:15px; justify-content:center;">
      <span class="nomchat-login-btn-icon">🔑</span>
      <span class="nomchat-login-btn-text">
        <span class="nomchat-login-btn-label">Continue with</span>
        <span class="nomchat-login-btn-brand">NOMCHAT ID</span>
      </span>
    </button>

    <div class="login-credits-note" style="margin-top:24px;">
      🎁 New accounts get <strong>50 free credits</strong> + <strong>300 bonus credits</strong> instantly
    </div>

    <p style="margin-top:20px; font-size:12px; color:var(--text3); line-height:1.6;">
      Don't have a Nomchat ID?
      <a href="https://nomchat-id.up.railway.app" target="_blank" style="color:var(--c); font-weight:600;">Create one free →</a>
    </p>
  </div>
</main>

<script>
window.addEventListener('scroll', () => {
  document.getElementById('header')?.classList.toggle('scrolled', window.scrollY > 10);
}, { passive: true });

// Already logged in? Redirect
(async () => {
  try {
    const r = await fetch('/api/auth/me', { credentials: 'include' });
    if (r.ok) window.location.href = '/chat.html';
  } catch(e) {}
})();

function showAlert(msg, type = 'error') {
  const el = document.getElementById('login-alert');
  el.className = `login-alert ${type}`;
  el.textContent = (type === 'error' ? '⚠️ ' : '✅ ') + msg;
  el.style.display = 'flex';
}

async function nomchatLogin() {
  const NOMCHAT_URL = 'https://nomchat-id.up.railway.app';
  const popup = window.open(
    `${NOMCHAT_URL}/oauth.html?app_id=ai-chat-pro&redirect=${encodeURIComponent(window.location.origin + '/login.html')}`,
    'nomchat-oauth', 'width=480,height=640,scrollbars=yes'
  );

  if (!popup) { showAlert('Popup blocked. Please allow popups for this site.'); return; }

  const handler = async (e) => {
    if (e.origin !== NOMCHAT_URL) return;
    const { token, error } = e.data || {};
    if (error) { showAlert(error); window.removeEventListener('message', handler); return; }
    if (token) {
      window.removeEventListener('message', handler);
      popup.close();
      try {
        const r = await fetch('/api/auth/nomchat', {
          method: 'POST', credentials: 'include',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token })
        });
        const d = await r.json();
        if (r.ok) {
          showAlert('Signed in! Redirecting...', 'success');
          setTimeout(() => window.location.href = '/chat.html', 800);
        } else {
          showAlert(d.error || 'Authentication failed.');
        }
      } catch(e) { showAlert('Network error.'); }
    }
  };

  window.addEventListener('message', handler);
  const check = setInterval(() => { if (popup.closed) { clearInterval(check); window.removeEventListener('message', handler); } }, 500);
}
</script>
</body>
</html>
