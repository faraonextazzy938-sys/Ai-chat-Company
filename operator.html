<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Operator Panel — AI Chat Company</title>
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
:root {
  --bg: #0d0d0d;
  --bg2: #141414;
  --bg3: #1c1c1c;
  --bg4: #252525;
  --border: #2a2a2a;
  --text: #e5e5e5;
  --text2: #888;
  --text3: #555;
  --accent: #10a37f;
  --accent2: #0d8a6b;
  --red: #ef4444;
  --yellow: #f59e0b;
  --blue: #3b82f6;
  --font: 'Segoe UI', -apple-system, Arial, sans-serif;
  --mono: 'Consolas', monospace;
}
html, body { height:100%; background:var(--bg); color:var(--text); font-family:var(--font); font-size:13px; overflow:hidden; }

/* ── LAYOUT ── */
.layout { display:flex; height:100vh; }

/* ── SIDEBAR ── */
.sidebar {
  width:300px; flex-shrink:0;
  background:var(--bg2); border-right:1px solid var(--border);
  display:flex; flex-direction:column;
}
.sidebar-header {
  padding:16px; border-bottom:1px solid var(--border);
  display:flex; align-items:center; gap:10px;
}
.op-logo { width:32px; height:32px; background:var(--accent); border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:16px; flex-shrink:0; }
.op-title { font-size:14px; font-weight:700; }
.op-sub { font-size:11px; color:var(--text2); }
.sidebar-search { padding:10px 12px; border-bottom:1px solid var(--border); }
.sidebar-search input {
  width:100%; background:var(--bg3); border:1px solid var(--border);
  border-radius:6px; padding:6px 10px; color:var(--text);
  font-size:12px; font-family:var(--font); outline:none;
}
.sidebar-search input:focus { border-color:var(--accent); }
.sessions-list { flex:1; overflow-y:auto; }
.sessions-list::-webkit-scrollbar { width:4px; }
.sessions-list::-webkit-scrollbar-thumb { background:var(--bg4); border-radius:99px; }
.session-item {
  padding:12px 14px; cursor:pointer; border-bottom:1px solid var(--border);
  transition:background 0.1s; display:flex; align-items:center; gap:10px;
  position:relative;
}
.session-item:hover { background:var(--bg3); }
.session-item.active { background:var(--bg4); }
.session-item.operator-on { border-left:3px solid var(--accent); }
.session-avatar {
  width:36px; height:36px; border-radius:50%; background:var(--bg4);
  display:flex; align-items:center; justify-content:center;
  font-size:18px; flex-shrink:0;
}
.session-info { flex:1; min-width:0; }
.session-name { font-size:13px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.session-preview { font-size:11px; color:var(--text2); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-top:2px; }
.session-meta { display:flex; flex-direction:column; align-items:flex-end; gap:4px; flex-shrink:0; }
.session-time { font-size:10px; color:var(--text3); }
.session-badge {
  font-size:9px; font-weight:700; padding:2px 6px; border-radius:99px;
  text-transform:uppercase; letter-spacing:0.5px;
}
.badge-ai { background:#1a3a2e; color:var(--accent); }
.badge-op { background:#1a2a3a; color:var(--blue); }
.badge-new { background:#3a1a1a; color:var(--red); }
.sessions-empty { padding:32px 16px; text-align:center; color:var(--text3); font-size:12px; }

/* ── MAIN CHAT AREA ── */
.main { flex:1; display:flex; flex-direction:column; overflow:hidden; }
.main-empty {
  flex:1; display:flex; align-items:center; justify-content:center;
  flex-direction:column; gap:12px; color:var(--text3);
}
.main-empty-icon { font-size:48px; opacity:0.3; }
.main-empty-text { font-size:14px; }

/* Chat header */
.chat-header {
  padding:12px 16px; border-bottom:1px solid var(--border);
  display:flex; align-items:center; gap:12px; flex-shrink:0;
  background:var(--bg2);
}
.chat-header-avatar { width:36px; height:36px; border-radius:50%; background:var(--bg4); display:flex; align-items:center; justify-content:center; font-size:18px; flex-shrink:0; }
.chat-header-info { flex:1; }
.chat-header-name { font-size:14px; font-weight:700; }
.chat-header-status { font-size:11px; color:var(--text2); margin-top:1px; }
.chat-header-actions { display:flex; gap:8px; }

/* Takeover button */
.btn-takeover {
  padding:7px 16px; border-radius:6px; border:none; cursor:pointer;
  font-size:12px; font-weight:700; font-family:var(--font);
  background:var(--accent); color:#fff; transition:background 0.15s;
  display:flex; align-items:center; gap:6px;
}
.btn-takeover:hover { background:var(--accent2); }
.btn-takeover.active { background:#1a3a5a; color:var(--blue); }
.btn-release {
  padding:7px 16px; border-radius:6px; border:1px solid var(--border); cursor:pointer;
  font-size:12px; font-weight:600; font-family:var(--font);
  background:var(--bg3); color:var(--text2); transition:all 0.15s;
}
.btn-release:hover { background:var(--bg4); color:var(--text); }

/* Messages */
.chat-messages {
  flex:1; overflow-y:auto; padding:16px; display:flex; flex-direction:column; gap:10px;
}
.chat-messages::-webkit-scrollbar { width:6px; }
.chat-messages::-webkit-scrollbar-thumb { background:var(--bg4); border-radius:99px; }
.msg { display:flex; gap:8px; animation:msgIn 0.15s ease; }
@keyframes msgIn { from{opacity:0;transform:translateY(4px)} to{opacity:1;transform:translateY(0)} }
.msg.user { flex-direction:row-reverse; }
.msg-av {
  width:28px; height:28px; border-radius:50%; flex-shrink:0; margin-top:2px;
  display:flex; align-items:center; justify-content:center; font-size:13px;
}
.msg.user .msg-av { background:var(--blue); color:#fff; font-size:10px; font-weight:700; }
.msg.ai .msg-av { background:var(--accent); color:#fff; font-size:10px; font-weight:700; }
.msg.operator .msg-av { background:#7c3aed; color:#fff; font-size:10px; font-weight:700; }
.msg-body { max-width:75%; }
.msg-bubble {
  padding:8px 12px; border-radius:10px; font-size:13px; line-height:1.55;
  word-break:break-word; white-space:pre-wrap;
}
.msg.user .msg-bubble { background:var(--bg4); border-top-right-radius:2px; }
.msg.ai .msg-bubble { background:#0d2a1e; border:1px solid #1a3a2e; border-top-left-radius:2px; }
.msg.operator .msg-bubble { background:#1a0d2e; border:1px solid #2a1a4e; border-top-left-radius:2px; color:#c4b5fd; }
.msg-time { font-size:10px; color:var(--text3); margin-top:3px; padding:0 2px; }
.msg.user .msg-time { text-align:right; }
.msg-role-label { font-size:10px; color:var(--text3); margin-bottom:2px; padding:0 2px; }
.msg.user .msg-role-label { text-align:right; }

/* Operator mode banner */
.op-banner {
  padding:8px 16px; background:#0d1a2e; border-bottom:1px solid #1a2a4e;
  display:flex; align-items:center; gap:8px; font-size:12px; color:var(--blue);
  flex-shrink:0;
}
.op-banner-dot { width:8px; height:8px; border-radius:50%; background:var(--blue); animation:pulse 1.5s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

/* Input area */
.chat-input-area {
  padding:12px 16px; border-top:1px solid var(--border); flex-shrink:0;
  background:var(--bg2);
}
.chat-input-wrap {
  display:flex; gap:8px; align-items:flex-end;
  background:var(--bg3); border:1px solid var(--border);
  border-radius:8px; padding:8px 10px; transition:border-color 0.15s;
}
.chat-input-wrap:focus-within { border-color:var(--accent); }
.chat-input-wrap.disabled { opacity:0.4; pointer-events:none; }
#opInput {
  flex:1; background:none; border:none; outline:none;
  color:var(--text); font-size:13px; font-family:var(--font);
  resize:none; max-height:120px; line-height:1.5; padding:2px 0;
}
#opInput::placeholder { color:var(--text3); }
.btn-send {
  width:32px; height:32px; background:var(--accent); border:none; border-radius:6px;
  color:#fff; cursor:pointer; display:flex; align-items:center; justify-content:center;
  flex-shrink:0; transition:background 0.15s;
}
.btn-send:hover { background:var(--accent2); }
.btn-send:disabled { opacity:0.3; cursor:not-allowed; }
.input-hint { font-size:11px; color:var(--text3); margin-top:6px; text-align:center; }

/* Stats bar */
.stats-bar {
  padding:8px 14px; border-bottom:1px solid var(--border);
  display:flex; gap:16px; background:var(--bg2); flex-shrink:0;
}
.stat { display:flex; align-items:center; gap:5px; font-size:11px; color:var(--text2); }
.stat-dot { width:7px; height:7px; border-radius:50%; }
.stat-dot.green { background:var(--accent); }
.stat-dot.blue { background:var(--blue); }
.stat-dot.gray { background:var(--text3); }

/* Notification */
.notif {
  position:fixed; top:16px; right:16px; z-index:9999;
  background:var(--bg3); border:1px solid var(--border); border-radius:8px;
  padding:10px 14px; font-size:12px; color:var(--text);
  box-shadow:0 4px 20px rgba(0,0,0,0.5); animation:notifIn 0.2s ease;
  max-width:280px;
}
@keyframes notifIn { from{opacity:0;transform:translateY(-8px)} to{opacity:1;transform:translateY(0)} }
.notif.success { border-left:3px solid var(--accent); }
.notif.info { border-left:3px solid var(--blue); }
.notif.error { border-left:3px solid var(--red); }
</style>
</head>
<body>

<div class="layout">
  <!-- Sidebar: sessions list -->
  <div class="sidebar">
    <div class="sidebar-header">
      <div class="op-logo">🎭</div>
      <div>
        <div class="op-title">Operator Panel</div>
        <div class="op-sub" id="opEmail">Loading...</div>
      </div>
    </div>
    <div class="stats-bar">
      <div class="stat"><div class="stat-dot green"></div><span id="statTotal">0</span> total</div>
      <div class="stat"><div class="stat-dot blue"></div><span id="statOp">0</span> operator</div>
      <div class="stat"><div class="stat-dot gray"></div><span id="statAI">0</span> AI</div>
    </div>
    <div class="sidebar-search">
      <input id="searchInput" placeholder="Search users..." oninput="filterSessions()">
    </div>
    <div class="sessions-list" id="sessionsList">
      <div class="sessions-empty">Loading sessions...</div>
    </div>
  </div>

  <!-- Main: chat view -->
  <div class="main" id="main">
    <div class="main-empty" id="mainEmpty">
      <div class="main-empty-icon">💬</div>
      <div class="main-empty-text">Select a chat to view</div>
    </div>

    <!-- Chat view (hidden until session selected) -->
    <div id="chatView" style="display:none;flex:1;flex-direction:column;overflow:hidden;display:none">
      <div class="chat-header">
        <div class="chat-header-avatar" id="chatAvatar">👤</div>
        <div class="chat-header-info">
          <div class="chat-header-name" id="chatName">—</div>
          <div class="chat-header-status" id="chatStatus">—</div>
        </div>
        <div class="chat-header-actions">
          <button class="btn-takeover" id="btnTakeover" onclick="toggleTakeover()">
            🎭 Стать ИИ
          </button>
          <button class="btn-release" onclick="refreshSession()" title="Refresh">↻</button>
        </div>
      </div>

      <div id="opBanner" class="op-banner" style="display:none">
        <div class="op-banner-dot"></div>
        Вы сейчас пишете вместо ИИ — пользователь видит ваши сообщения как ответы AI
      </div>

      <div class="chat-messages" id="chatMessages"></div>

      <div class="chat-input-area">
        <div class="chat-input-wrap disabled" id="inputWrap">
          <textarea id="opInput" placeholder="Возьмите чат чтобы писать..." rows="1"
            oninput="autoResize(this)" onkeydown="inputKeydown(event)"></textarea>
          <button class="btn-send" id="btnSend" onclick="sendMessage()" disabled>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
              <path d="M22 2L11 13M22 2L15 22l-4-9-9-4 20-7z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
        </div>
        <div class="input-hint" id="inputHint">Нажмите "Стать ИИ" чтобы начать отвечать вместо AI</div>
      </div>
    </div>
  </div>
</div>

<script>
let currentUser = null;
let sessions = [];
let activeSession = null;
let isOperator = false;
let pollInterval = null;
let sessionsPollInterval = null;
let lastMsgId = 0;

// ── Init ──────────────────────────────────────────────────────
async function init() {
  try {
    const res = await fetch('/api/auth/me', { credentials: 'include' });
    if (!res.ok) { window.location.href = '/login.html'; return; }
    currentUser = await res.json();
    document.getElementById('opEmail').textContent = currentUser.email;
  } catch (_) { window.location.href = '/login.html'; return; }

  // Check operator access
  const test = await fetch('/api/operator/sessions', { credentials: 'include' });
  if (!test.ok) {
    document.body.innerHTML = `<div style="display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;gap:12px;color:#888">
      <div style="font-size:48px">🚫</div>
      <div style="font-size:16px;color:#e5e5e5">Access denied</div>
      <div style="font-size:13px">This panel is for operators only</div>
      <a href="/" style="color:#10a37f;margin-top:8px">← Back to home</a>
    </div>`;
    return;
  }

  await loadSessions();
  sessionsPollInterval = setInterval(loadSessions, 5000);
}

// ── Sessions ──────────────────────────────────────────────────
async function loadSessions() {
  try {
    const res = await fetch('/api/operator/sessions', { credentials: 'include' });
    if (!res.ok) return;
    sessions = await res.json();
    renderSessions();
    updateStats();
  } catch (_) {}
}

function renderSessions(filter = '') {
  const list = document.getElementById('sessionsList');
  const filtered = filter
    ? sessions.filter(s => (s.user?.username || '').toLowerCase().includes(filter.toLowerCase()) ||
                           (s.user?.email || '').toLowerCase().includes(filter.toLowerCase()))
    : sessions;

  if (!filtered.length) {
    list.innerHTML = '<div class="sessions-empty">No chats yet</div>';
    return;
  }

  list.innerHTML = filtered.map(s => {
    const u = s.user || {};
    const isActive = activeSession?.id === s.id;
    const time = formatTime(s.updated_at);
    const badge = s.operator_on
      ? '<span class="session-badge badge-op">Operator</span>'
      : '<span class="session-badge badge-ai">AI</span>';
    return `<div class="session-item ${isActive ? 'active' : ''} ${s.operator_on ? 'operator-on' : ''}"
      onclick="selectSession(${s.id})">
      <div class="session-avatar">${u.avatar || '👤'}</div>
      <div class="session-info">
        <div class="session-name">${esc(u.username || u.email || 'Unknown')}</div>
        <div class="session-preview">${esc(u.email || '')}</div>
      </div>
      <div class="session-meta">
        <span class="session-time">${time}</span>
        ${badge}
      </div>
    </div>`;
  }).join('');
}

function updateStats() {
  document.getElementById('statTotal').textContent = sessions.length;
  document.getElementById('statOp').textContent = sessions.filter(s => s.operator_on).length;
  document.getElementById('statAI').textContent = sessions.filter(s => !s.operator_on).length;
}

function filterSessions() {
  renderSessions(document.getElementById('searchInput').value);
}

// ── Select session ────────────────────────────────────────────
async function selectSession(sid) {
  if (pollInterval) clearInterval(pollInterval);

  const res = await fetch(`/api/operator/session/${sid}`, { credentials: 'include' });
  if (!res.ok) return;
  activeSession = await res.json();
  isOperator = activeSession.operator_on;
  lastMsgId = 0;

  document.getElementById('mainEmpty').style.display = 'none';
  const cv = document.getElementById('chatView');
  cv.style.display = 'flex';
  cv.style.flexDirection = 'column';

  const u = activeSession.user || {};
  document.getElementById('chatAvatar').textContent = u.avatar || '👤';
  document.getElementById('chatName').textContent = u.username || u.email || 'Unknown';
  document.getElementById('chatStatus').textContent = u.email || '';

  renderMessages(activeSession.messages || []);
  updateOperatorUI();
  renderSessions(document.getElementById('searchInput').value);

  // Start polling
  pollInterval = setInterval(pollMessages, 2000);
}

async function refreshSession() {
  if (!activeSession) return;
  await selectSession(activeSession.id);
}

// ── Messages ──────────────────────────────────────────────────
function renderMessages(msgs) {
  const container = document.getElementById('chatMessages');
  container.innerHTML = '';
  msgs.forEach(m => appendMessage(m));
  if (msgs.length) lastMsgId = msgs[msgs.length - 1].id;
}

function appendMessage(m) {
  const container = document.getElementById('chatMessages');
  const div = document.createElement('div');
  div.className = `msg ${m.role}`;
  div.id = `msg-${m.id}`;

  const roleLabels = { user: 'User', ai: 'AI', operator: 'You (as AI)' };
  const avLabels   = { user: '👤', ai: 'AI', operator: 'OP' };

  div.innerHTML = `
    <div class="msg-av">${avLabels[m.role] || '?'}</div>
    <div class="msg-body">
      <div class="msg-role-label">${roleLabels[m.role] || m.role}</div>
      <div class="msg-bubble">${esc(m.content)}</div>
      <div class="msg-time">${formatTime(m.created_at)}</div>
    </div>`;
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

async function pollMessages() {
  if (!activeSession) return;
  try {
    const res = await fetch(`/api/operator/poll/${activeSession.id}?since=${lastMsgId}`, { credentials: 'include' });
    if (!res.ok) return;
    const data = await res.json();
    data.messages.forEach(m => {
      if (!document.getElementById(`msg-${m.id}`)) {
        appendMessage(m);
        lastMsgId = Math.max(lastMsgId, m.id);
      }
    });
  } catch (_) {}
}

// ── Takeover ──────────────────────────────────────────────────
async function toggleTakeover() {
  if (!activeSession) return;
  if (!isOperator) {
    const res = await fetch('/api/operator/takeover', {
      method: 'POST', credentials: 'include',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ session_id: activeSession.id })
    });
    if (res.ok) {
      isOperator = true;
      activeSession.operator_on = true;
      updateOperatorUI();
      notify('Вы взяли чат — теперь пишете вместо ИИ', 'success');
      loadSessions();
    }
  } else {
    const res = await fetch('/api/operator/release', {
      method: 'POST', credentials: 'include',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ session_id: activeSession.id })
    });
    if (res.ok) {
      isOperator = false;
      activeSession.operator_on = false;
      updateOperatorUI();
      notify('Чат передан обратно ИИ', 'info');
      loadSessions();
    }
  }
}

function updateOperatorUI() {
  const btn = document.getElementById('btnTakeover');
  const banner = document.getElementById('opBanner');
  const wrap = document.getElementById('inputWrap');
  const input = document.getElementById('opInput');
  const sendBtn = document.getElementById('btnSend');
  const hint = document.getElementById('inputHint');

  if (isOperator) {
    btn.textContent = '🔄 Вернуть ИИ';
    btn.style.background = '#1a2a3a';
    btn.style.color = '#60a5fa';
    banner.style.display = 'flex';
    wrap.classList.remove('disabled');
    input.placeholder = 'Напишите ответ пользователю...';
    input.disabled = false;
    sendBtn.disabled = false;
    hint.textContent = 'Enter — отправить · Shift+Enter — новая строка';
  } else {
    btn.textContent = '🎭 Стать ИИ';
    btn.style.background = '';
    btn.style.color = '';
    banner.style.display = 'none';
    wrap.classList.add('disabled');
    input.placeholder = 'Возьмите чат чтобы писать...';
    input.disabled = true;
    sendBtn.disabled = true;
    hint.textContent = 'Нажмите "Стать ИИ" чтобы начать отвечать вместо AI';
  }
}

// ── Send message ──────────────────────────────────────────────
async function sendMessage() {
  if (!activeSession || !isOperator) return;
  const input = document.getElementById('opInput');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  autoResize(input);

  const res = await fetch('/api/operator/send', {
    method: 'POST', credentials: 'include',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ session_id: activeSession.id, content: text })
  });
  if (res.ok) {
    const data = await res.json();
    if (!document.getElementById(`msg-${data.message.id}`)) {
      appendMessage(data.message);
      lastMsgId = Math.max(lastMsgId, data.message.id);
    }
  } else {
    notify('Ошибка отправки', 'error');
  }
}

function inputKeydown(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

// ── Utils ─────────────────────────────────────────────────────
function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function formatTime(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  const now = new Date();
  const diff = now - d;
  if (diff < 60000) return 'just now';
  if (diff < 3600000) return Math.floor(diff / 60000) + 'm ago';
  if (diff < 86400000) return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  return d.toLocaleDateString([], { month: 'short', day: 'numeric' });
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function notify(msg, type = 'info') {
  const n = document.createElement('div');
  n.className = `notif ${type}`;
  n.textContent = msg;
  document.body.appendChild(n);
  setTimeout(() => { n.style.opacity = '0'; n.style.transition = 'opacity 0.3s'; setTimeout(() => n.remove(), 300); }, 3000);
}

init();
</script>
</body>
</html>
